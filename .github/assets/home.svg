<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MCSR Client home screen">
  <defs>
    <linearGradient id="appbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0c13"/>
      <stop offset="1" stop-color="#08080e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16161f"/>
      <stop offset="1" stop-color="#121219"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5c842" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f5c842" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fcf57"/>
      <stop offset="1" stop-color="#4ea73e"/>
    </linearGradient>
    <linearGradient id="day" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd3ff"/><stop offset="1" stop-color="#3fa0e0"/>
    </linearGradient>
    <clipPath id="screen"><rect x="0" y="0" width="1000" height="620" rx="14"/></clipPath>
    <clipPath id="faceClip"><circle cx="20" cy="15" r="11"/></clipPath>
  </defs>

  <g clip-path="url(#screen)" font-family="'Segoe UI', system-ui, sans-serif">
    <rect width="1000" height="620" fill="url(#appbg)"/>

    <!-- ===== Title bar ===== -->
    <rect x="0" y="0" width="1000" height="34" fill="#08080d"/>
    <g transform="translate(16,5)">
      <!-- mini clock mark -->
      <circle cx="12" cy="12" r="11" fill="#e0a92c"/>
      <circle cx="12" cy="12" r="8.5" fill="#f5c842"/>
      <g clip-path="url(#faceClip)" transform="translate(-8,-3)">
        <rect x="9" y="4" width="22" height="11" fill="url(#day)"/>
        <rect x="9" y="15" width="22" height="11" fill="#161636"/>
        <rect x="22" y="7" width="6" height="6" fill="#fff4cf"/>
        <rect x="13" y="18" width="3" height="3" fill="#ffffff"/>
        <rect x="24" y="20" width="2" height="2" fill="#ffffff"/>
      </g>
      <text x="34" y="16" font-size="13" font-weight="800" letter-spacing="2" fill="#f5c842">MCSR</text>
      <text x="84" y="16" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6b6b7a">CLIENT</text>
    </g>
    <g fill="#5c5c6a"><rect x="936" y="16" width="11" height="2"/><path d="M964 8 l12 12 M976 8 l-12 12" stroke="#5c5c6a" stroke-width="1.6"/></g>

    <!-- ===== Sidebar ===== -->
    <rect x="0" y="34" width="66" height="586" fill="#070710"/>
    <rect x="0" y="34" width="3" height="586" fill="#0d0d15"/>
    <!-- active Home -->
    <rect x="8" y="46" width="50" height="50" rx="11" fill="#f5c842" fill-opacity="0.13"/>
    <rect x="2" y="58" width="3" height="26" rx="1.5" fill="#f5c842"/>
    <g stroke="#f5c842" stroke-width="1.4" fill="none"><path d="M22 64 l11 -9 11 9 v11 a1 1 0 0 1 -1 1 h-6 v-7 h-8 v7 h-6 a1 1 0 0 1 -1 -1 z"/></g>
    <text x="33" y="90" font-size="9" fill="#f5c842" text-anchor="middle">Home</text>
    <!-- other nav -->
    <g fill="#71717f" font-size="9" text-anchor="middle">
      <g stroke="#71717f" stroke-width="1.4" fill="none"><path d="M27 116 l13 8 -13 8 z"/></g><text x="33" y="146">Play</text>
      <g stroke="#71717f" stroke-width="1.4" fill="none"><circle cx="33" cy="176" r="5"/><path d="M25 192 a8 8 0 0 1 16 0"/></g><text x="33" y="206">Profile</text>
      <g stroke="#71717f" stroke-width="1.4" fill="none"><circle cx="33" cy="236" r="3.2"/><path d="M33 228v-3M33 247v-3M25 236h-3M44 236h-3"/></g><text x="33" y="266">Settings</text>
    </g>
    <!-- player head + version at the bottom -->
    <rect x="18" y="544" width="30" height="30" rx="6" fill="#2a2a38"/>
    <rect x="22" y="548" width="22" height="22" fill="#c39570"/>
    <rect x="22" y="548" width="22" height="7" fill="#5a3a22"/>
    <rect x="27" y="558" width="4" height="4" fill="#3a5fcf"/><rect x="35" y="558" width="4" height="4" fill="#3a5fcf"/>
    <text x="33" y="592" font-size="9" fill="#4f4f5e" text-anchor="middle" font-weight="600">v0.2.0</text>

    <!-- ===== Profile hero card ===== -->
    <rect x="86" y="48" width="896" height="250" rx="12" fill="url(#card)" stroke="#23232c"/>
    <!-- avatar -->
    <rect x="108" y="70" width="96" height="96" rx="8" fill="#21212c"/>
    <g>
      <rect x="118" y="80" width="76" height="76" fill="#c39570"/>
      <rect x="118" y="80" width="76" height="22" fill="#5a3a22"/>
      <rect x="118" y="80" width="10" height="62" fill="#5a3a22" opacity="0.55"/>
      <rect x="133" y="108" width="13" height="13" fill="#ffffff"/><rect x="137" y="111" width="7" height="8" fill="#3a5fcf"/>
      <rect x="166" y="108" width="13" height="13" fill="#ffffff"/><rect x="170" y="111" width="7" height="8" fill="#3a5fcf"/>
      <rect x="146" y="132" width="20" height="6" fill="#7c5436"/>
    </g>
    <!-- identity -->
    <text x="226" y="100" font-size="27" font-weight="800" fill="#ecedf3">Feinberg</text>
    <rect x="372" y="83" width="26" height="17" rx="3" fill="#23232c"/><text x="385" y="96" font-size="10" fill="#9a9aa8" text-anchor="middle">US</text>
    <text x="226" y="124" font-size="11" letter-spacing="1" fill="#8a8a99">ELO</text>
    <text x="226" y="166" font-size="44" font-weight="800" fill="#c4b5fd">2271</text>
    <!-- tier badge -->
    <rect x="356" y="138" width="150" height="34" rx="8" fill="#9b7bff" fill-opacity="0.12" stroke="#9b7bff" stroke-opacity="0.55"/>
    <rect x="372" y="151" width="9" height="9" rx="2" fill="#9b7bff"/>
    <text x="391" y="160" font-size="15" font-weight="700" fill="#c4b5fd">Netherite</text>
    <text x="356" y="192" font-size="12" fill="#8a8a99">Global rank <tspan fill="#ecedf3" font-weight="700">#5</tspan></text>
    <!-- decay warning -->
    <rect x="226" y="180" width="362" height="26" rx="6" fill="#f5c842" fill-opacity="0.08" stroke="#f5c842" stroke-opacity="0.3"/>
    <text x="240" y="197" font-size="11" fill="#e7c66a">⚠ ELO decay scheduled — play a ranked match to reset it.</text>

    <!-- stat cards -->
    <g>
      <g transform="translate(108,226)"><rect width="206" height="56" rx="9" fill="#101017" stroke="#20202a"/><text x="16" y="22" font-size="10" letter-spacing="1" fill="#7a7a88">WIN RATE</text><text x="16" y="44" font-size="20" font-weight="800" fill="#6fcf57">63.9%</text><text x="120" y="44" font-size="10" fill="#5c5c6a">205W · 116L</text></g>
      <g transform="translate(330,226)"><rect width="206" height="56" rx="9" fill="#101017" stroke="#20202a"/><text x="16" y="22" font-size="10" letter-spacing="1" fill="#7a7a88">WIN STREAK</text><text x="16" y="44" font-size="20" font-weight="800" fill="#ecedf3">5</text><text x="44" y="44" font-size="10" fill="#5c5c6a">best 15</text></g>
      <g transform="translate(552,226)"><rect width="206" height="56" rx="9" fill="#101017" stroke="#20202a"/><text x="16" y="22" font-size="10" letter-spacing="1" fill="#7a7a88">BEST TIME</text><text x="16" y="44" font-size="20" font-weight="800" fill="#f5c842">6:08.221</text></g>
      <g transform="translate(774,226)"><rect width="190" height="56" rx="9" fill="#101017" stroke="#20202a"/><text x="16" y="22" font-size="10" letter-spacing="1" fill="#7a7a88">MATCHES</text><text x="16" y="44" font-size="20" font-weight="800" fill="#ecedf3">325</text><text x="56" y="44" font-size="10" fill="#5c5c6a">this season</text></g>
    </g>

    <!-- ===== ELO chart ===== -->
    <rect x="86" y="312" width="556" height="232" rx="12" fill="url(#card)" stroke="#23232c"/>
    <text x="108" y="344" font-size="12" letter-spacing="1.5" fill="#9a9aa8" font-weight="700">ELO · THIS SEASON</text>
    <text x="620" y="344" font-size="15" font-weight="800" fill="#f5c842" text-anchor="end">2257</text>
    <text x="108" y="372" font-size="10" fill="#4f4f5e">285</text>
    <text x="108" y="520" font-size="10" fill="#4f4f5e">181</text>
    <path d="M138 510 L138 470 L178 478 L218 452 L258 460 L298 430 L338 446 L378 408 L418 424 L458 460 L498 430 L538 470 L578 420 L618 392 L618 524 L138 524 Z" fill="url(#area)"/>
    <path d="M138 470 L178 478 L218 452 L258 460 L298 430 L338 446 L378 408 L418 424 L458 460 L498 430 L538 470 L578 420 L618 392" fill="none" stroke="#f5c842" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- ===== Live pace ===== -->
    <rect x="660" y="312" width="322" height="232" rx="12" fill="url(#card)" stroke="#23232c"/>
    <rect x="682" y="332" width="10" height="10" rx="2" fill="#9b7bff"/>
    <text x="700" y="342" font-size="12" letter-spacing="1.5" fill="#9a9aa8" font-weight="700">LIVE PACE</text>
    <rect x="908" y="328" width="56" height="20" rx="10" fill="#15151c" stroke="#2a2a36"/>
    <circle cx="922" cy="338" r="3" fill="#5c5c6a"/><text x="932" y="342" font-size="10" fill="#8a8a99">IDLE</text>
    <text x="821" y="430" font-size="12" fill="#7a7a88" text-anchor="middle">No recent runs. Launch RSG and</text>
    <text x="821" y="450" font-size="12" fill="#7a7a88" text-anchor="middle">your splits appear here.</text>

    <!-- ===== Bottom play bar ===== -->
    <rect x="66" y="566" width="934" height="54" fill="#0a0a11"/>
    <rect x="66" y="566" width="934" height="1" fill="#1b1b24"/>
    <rect x="86" y="580" width="150" height="26" rx="13" fill="#15151c" stroke="#2a2a36"/>
    <circle cx="104" cy="593" r="4" fill="#6fcf57"/><text x="116" y="597" font-size="12" font-weight="700" fill="#ecedf3">Ranked</text>
    <rect x="176" y="586" width="2" height="14" fill="#2a2a36"/>
    <text x="190" y="597" font-size="12" font-weight="600" fill="#6b6b7a">RSG</text>
    <text x="252" y="589" font-size="12" font-weight="700" fill="#ecedf3">Ranked</text>
    <text x="252" y="604" font-size="10" fill="#6b6b7a">Not installed — first launch downloads everything</text>
    <rect x="724" y="580" width="74" height="28" rx="8" fill="#15151c" stroke="#2a2a36"/><text x="761" y="599" font-size="12" fill="#9a9aa8" text-anchor="middle">Details</text>
    <rect x="812" y="578" width="172" height="32" rx="9" fill="url(#play)"/>
    <text x="898" y="599" font-size="14" font-weight="800" fill="#07140a" text-anchor="middle">▶ INSTALL &amp; PLAY</text>
  </g>
</svg>
