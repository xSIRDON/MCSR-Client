<svg viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MCSR Client — Ranked, RSG, and ZSG in one launcher">
  <defs>
    <!-- Background gradient: near-black, faintly warmed toward the gold accent -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a10"/>
      <stop offset="0.55" stop-color="#0c0c14"/>
      <stop offset="1" stop-color="#08080d"/>
    </linearGradient>
    <!-- Soft gold glow behind the clock -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5c842" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="#f5c842" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <!-- Wordmark gradient: gold to a slightly hotter gold -->
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe79a"/>
      <stop offset="0.5" stop-color="#f5c842"/>
      <stop offset="1" stop-color="#e0a92c"/>
    </linearGradient>
    <!-- Day half of the clock face -->
    <linearGradient id="day" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd3ff"/>
      <stop offset="1" stop-color="#3fa0e0"/>
    </linearGradient>
    <!-- Night half of the clock face -->
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1b3a"/>
      <stop offset="1" stop-color="#0d0d24"/>
    </linearGradient>
    <!-- Clock face clip (geometry in root coordinate space, centered at 190,180) -->
    <clipPath id="faceClip"><circle cx="190" cy="180" r="78"/></clipPath>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Subtle grid of faint blocky dots for texture -->
  <g fill="#23232c" opacity="0.5">
    <rect x="60"  y="40"  width="3" height="3"/>
    <rect x="160" y="300" width="3" height="3"/>
    <rect x="980" y="60"  width="3" height="3"/>
    <rect x="1120" y="120" width="3" height="3"/>
    <rect x="1200" y="280" width="3" height="3"/>
    <rect x="700" y="30"  width="3" height="3"/>
    <rect x="860" y="320" width="3" height="3"/>
    <rect x="540" y="310" width="3" height="3"/>
    <rect x="1040" y="240" width="3" height="3"/>
  </g>

  <!-- Hairline top/bottom borders -->
  <rect x="0" y="0" width="1280" height="1" fill="#23232c"/>
  <rect x="0" y="359" width="1280" height="1" fill="#23232c"/>

  <!-- ===== Pixel-art Minecraft clock, left side ===== -->
  <!-- Each "pixel" is a 12x12 block; the clock is built on a grid centered at (190,180). -->
  <g transform="translate(190,180)">
    <!-- Glow halo -->
    <circle cx="0" cy="0" r="150" fill="url(#glow)"/>

    <!-- Clock body, drawn as concentric blocky rings.
         Use crispEdges so the pixel steps stay sharp. -->
    <g shape-rendering="crispEdges">
      <!-- Gold rim: outer blocky ring approximated by a thick stroked rounded square-circle.
           Built from a tiled ring of blocks for a true pixel feel. -->
      <!-- Outer rim base -->
      <circle cx="0" cy="0" r="108" fill="#0a0a10"/>
      <!-- Rim ring: gold -->
      <g>
        <!-- We fake a pixel rim by layering a gold disc then carving the face -->
        <circle cx="0" cy="0" r="108" fill="#e0a92c"/>
        <circle cx="0" cy="0" r="100" fill="#f5c842"/>
        <circle cx="0" cy="0" r="92"  fill="#ffe79a"/>
        <circle cx="0" cy="0" r="86"  fill="#f5c842"/>
      </g>

      <!-- Face: split day (top) / night (bottom) -->
      <g clip-path="url(#faceClip)">
        <rect x="-78" y="-78" width="156" height="78" fill="url(#day)"/>
        <rect x="-78" y="0"   width="156" height="78" fill="url(#night)"/>

        <!-- Day side: blocky sun -->
        <g fill="#ffe79a">
          <rect x="22" y="-50" width="20" height="20"/>
          <rect x="16" y="-44" width="32" height="32"/>
        </g>
        <g fill="#fff4cf">
          <rect x="20" y="-48" width="24" height="24"/>
        </g>
        <!-- Day side: a couple of pixel clouds -->
        <g fill="#dff1ff" opacity="0.9">
          <rect x="-58" y="-30" width="26" height="8"/>
          <rect x="-50" y="-38" width="16" height="8"/>
        </g>

        <!-- Night side: blocky moon -->
        <g fill="#e9e9ff">
          <rect x="-46" y="22" width="22" height="22"/>
          <rect x="-40" y="16" width="22" height="34"/>
        </g>
        <rect x="-30" y="20" width="16" height="26" fill="url(#night)"/>
        <!-- Night side: pixel stars -->
        <g fill="#ffffff">
          <rect x="20" y="20"  width="5" height="5"/>
          <rect x="44" y="38"  width="4" height="4"/>
          <rect x="30" y="54"  width="4" height="4"/>
          <rect x="8"  y="46"  width="3" height="3"/>
          <rect x="52" y="14"  width="3" height="3"/>
        </g>
      </g>

      <!-- Center divider line (horizon) -->
      <rect x="-78" y="-2" width="156" height="4" fill="#23232c" opacity="0.6"/>

      <!-- Outer pixel "notches" on the rim for the blocky Minecraft look -->
      <g fill="#ffe79a">
        <rect x="-6"  y="-118" width="12" height="12"/>
        <rect x="-6"  y="106"  width="12" height="12"/>
        <rect x="-118" y="-6"  width="12" height="12"/>
        <rect x="106"  y="-6"  width="12" height="12"/>
      </g>
    </g>
  </g>

  <!-- ===== Wordmark + tagline + chips, right side ===== -->
  <g transform="translate(360,0)">
    <!-- Wordmark -->
    <text x="0" y="158"
          font-family="'Segoe UI', 'Trebuchet MS', system-ui, sans-serif"
          font-size="92" font-weight="800" letter-spacing="2"
          fill="url(#word)">MCSR CLIENT</text>

    <!-- Thin accent underline under the wordmark -->
    <rect x="4" y="178" width="560" height="3" rx="1.5" fill="#23232c"/>
    <rect x="4" y="178" width="200" height="3" rx="1.5" fill="#f5c842"/>

    <!-- Tagline -->
    <text x="6" y="216"
          font-family="'Consolas', 'SFMono-Regular', ui-monospace, monospace"
          font-size="17" font-weight="400" letter-spacing="0.2"
          fill="#c7c7d1">Ranked, RSG, and ZSG in one launcher — live stats, real launching, built-in paceman.</text>

    <!-- Chips -->
    <g font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="1">
      <!-- RANKED (gold) -->
      <g transform="translate(6,250)">
        <rect x="0" y="0" width="118" height="34" rx="8" fill="#15151c" stroke="#f5c842" stroke-opacity="0.6"/>
        <circle cx="20" cy="17" r="5" fill="#f5c842"/>
        <text x="36" y="23" fill="#f5c842">RANKED</text>
      </g>
      <!-- RSG (teal) -->
      <g transform="translate(140,250)">
        <rect x="0" y="0" width="86" height="34" rx="8" fill="#15151c" stroke="#3fd0c9" stroke-opacity="0.6"/>
        <circle cx="20" cy="17" r="5" fill="#3fd0c9"/>
        <text x="36" y="23" fill="#3fd0c9">RSG</text>
      </g>
      <!-- ZSG (violet) -->
      <g transform="translate(242,250)">
        <rect x="0" y="0" width="86" height="34" rx="8" fill="#15151c" stroke="#9b7bff" stroke-opacity="0.6"/>
        <circle cx="20" cy="17" r="5" fill="#9b7bff"/>
        <text x="36" y="23" fill="#9b7bff">ZSG</text>
      </g>
    </g>
  </g>
</svg>